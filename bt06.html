<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kết quả học tập</title>
</head>
<body>
    <table border="1" width="80%" align="center">
        <caption><h2>KẾT QUẢ HỌC TẬP</h2></caption>

            <tr><th>Toán</th><th>Văn</th><th>Ngoại ngữ</th></tr>
        </thead>
        <tbody align="center">
            <tr><td align="left">Trần Văn Thành</td><td>8</td><td>5</td><td>7</td><td bgcolor="yellow">Đạt</td></tr>
            <tr><td align="left">Lê Thanh Sơn</td><td>4</td><td>9</td><td>6</td><td bgcolor="red">Không đạt</td></tr>
            <tr><td align="left">Nguyễn Thị Tuyết</td><td>8</td><td>9</td><td>5</td><td bgcolor="yellow">Đạt</td></tr>
        </tbody>
        <tfoot>
            <tr><td colspan="4">Tổng số học sinh đạt</td><td align="center">2</td></tr>
        </tfoot>
    </table>
</body>
</html>
