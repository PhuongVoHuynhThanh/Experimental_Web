    <h1 align="center">ĐĂNG KÝ THAM GIA DIỄN ĐÀN</h1>
    <div>
        <form action="" id="register">
            <table bgcolor="yellow" align="center" border="1" style="table-layout: fixed; width:40%">
                <tr>
                    <td><label for="unm">Tên đăng nhập:</label></td>
                    <td><input type="text" id="Unm" name="name" placeholder="Nhập tên dăng nhập" required></td>
                </tr>
                <tr>
                    <td><label for="pwd"></label>Mật khẩu:</td>
                    <td><input type="password" id="pwd" name="matKhau" required minlength="3" maxlength="15"></td>
                </tr>
                <tr>
                    <td><label for="sex"></label>Giới tính:</td>
                    <td><input type="radio" id="sex" name="sex" value="male">Nam
                        <input type="radio" id="sex" name="sex" value="female">Nữ</td>
                </tr>
                <tr>
                    <td><label for="birth"></label> Ngày sanh:</td>
                    <td><input type="date" id="birth" name="sanhNhat"></td>
                </tr>
                <tr>
                    <td><label for="email"></label>Email:</td>
                    <td><input type="email" name="email"></td>
                </tr>
                <tr>
                    <td><label for="sel">Ngôn ngữ lập trình yêu thích nhất:</label></td>
                    <td><input type="text" list="sel">
                        <datalist id="sel">
                            <option>C++</option>
                            <option>C#</option>
                            <option>PHP</option>
                            <option>Java</option>
                            <option>Python</option>
                        </datalist>
                    </td>
                </tr>
                <tr>
                    <td><label for="rule">Quy định khi tham gia diễn đàn:</label></td>
                    <td><textarea name="rule" id="rule" cols="30" rows="5" readonly>Bài viết phải nghiêm túc, không có chứa quảng cáo, không có nội dung phản cảm.</textarea></td>
                </tr>
                <tr>
                    <td></td>
                    <td>
                        <button type="submit">
                            <img src="Images/register_buttons.png" width="60" height="40">
                        </button>
                        <button type="reset">
                            <img src="Images/reset_buttons.png" width="60" height="40">
                        </button>
                    </td>
                </tr>
            </table>
        </form>
    </div>
